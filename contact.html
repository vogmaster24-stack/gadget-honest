<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact | GadgetHonest</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar"><!-- same --></nav>
    
    <main class="contact-page">
        <div class="container">
            <h1>📬 Contact Us</h1>
            <div class="contact-form">
                <form>
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" placeholder="Your name">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" placeholder="you@example.com">
                    </div>
                    <div class="form-group">
                        <label>Message</label>
                        <textarea rows="5" placeholder="Your question or feedback..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Send Message</button>
                </form>
            </div>
        </div>
    </main>
    
    <footer class="footer"><!-- same --></footer>
</body>
</html>
